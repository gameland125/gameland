<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#c9a227">
  <meta name="description" content="PWA shell with golden status and offline cache">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./style.css">
  <title>Gameland PWA</title>
</head>
<body>
  <main class="app">
    <section class="card">
      <div class="top-row">
        <span id="network-badge" class="badge offline">آفلاین</span>
        <span id="install-badge" class="badge muted">در حال بررسی</span>
      </div>

      <h1 class="title">Gameland</h1>
      <p class="subtitle">نسخه امن PWA با پیام طلایی و حافظه آفلاین</p>

      <div class="status-panel">
        <p id="status-text" class="status-text">در حال آماده‌سازی برنامه...</p>
        <div class="progress-track" aria-hidden="true">
          <div id="progress-bar" class="progress-bar"></div>
        </div>
      </div>

      <div class="actions">
        <button id="check-button" type="button">بررسی حافظه آفلاین</button>
        <button id="restart-button" type="button">تازه‌سازی وضعیت</button>
      </div>

      <div class="golden-message" id="golden-message">
        پیغام طلایی: برنامه آماده نصب و استفاده آفلاین است.
      </div>
    </section>
  </main>

  <script src="./main.js"></script>
</body>
</html>
