<script>
function DLProgress(e) {
    if (e && e.lengthComputable) {
        var percent = Math.round((e.loaded / e.total) * 100);
        msgs.innerHTML = "Installing Offline Cache... " + percent + "%";
    } else {
        msgs.innerHTML = "Installing Offline Cache...";
    }
}

function DisplayCacheProgress() {
    msgs.innerHTML = "Cache Installed Successfully";
    setTimeout(function () {
        window.location.href = "index.html";
    }, 1500);
}

window.applicationCache.addEventListener("progress", DLProgress, false);

window.applicationCache.addEventListener("cached", DisplayCacheProgress, false);
window.applicationCache.addEventListener("updateready", function () {
    try {
        window.applicationCache.swapCache();
    } catch(e) {}
    DisplayCacheProgress();
}, false);

window.applicationCache.addEventListener("error", function () {
    msgs.innerHTML = "Cache Error - Refresh Page";
}, false);
</script>
