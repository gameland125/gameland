<html manifest="PSFree.manifest">
<head>
<meta charset="utf-8">
<title>PSFree-Lapse Exploit For PS4 9.00</title>
<link rel="shortcut icon" href="favicon.ico">
<style>
body{
    background-image: url("bg.jpg");
    background-repeat: no-repeat;
    background-size: 70%;
    background-position: center;
    background-color: white;
    color: black;
    font-size: 20px;
    text-align: center;
    margin: 0;
    overflow: hidden;
}
.info{
    overflow: hidden;
    position: fixed;
    position: absolute;
    top: 45%;
    left: 50%;
    font-size: 25px;
    font-family: sans-serif;
    color: black;
    transform: translate(-50%, -50%);
}
</style>
<script>
var cacheCompleted = false;

function DLProgress(e) {
    var total = e.total || 1;
    var percent = Math.round((e.loaded / total) * 100);
    document.getElementById("msgs").innerHTML = "Installing Offline Cache ... " + percent + "%";
}

function DisplayCacheProgress() {
    if (cacheCompleted) return;
    cacheCompleted = true;

    document.getElementById("msgs").innerHTML = "Cache Installed Successfully";
    sessionStorage.setItem("continueAfterInstall", "true");

    setTimeout(function () {
        location.replace("index.html");
    }, 3000);
}

window.applicationCache.addEventListener("progress", DLProgress, false);
window.applicationCache.addEventListener("cached", DisplayCacheProgress, false);
window.applicationCache.addEventListener("updateready", DisplayCacheProgress, false);
</script>
</head>
<body style="overflow:hidden">
<div id="msgs" class="info" style='-webkit-font-feature-settings:"tnum";font-feature-settings:"tnum";'></div>
</body>
</html>
