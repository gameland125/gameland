<!DOCTYPE html>
<html manifest="PSFree.manifest">
<head>
  <meta charset="UTF-8">
  <title>Gameland Cache</title>
</head>
<body style="background:#222;color:white;font-family:Arial;text-align:center;padding-top:80px;">
  <h1>GAMELAND</h1>
  <h2>Installing Offline Cache...</h2>
  <p id="status">Please wait...</p>

  <script>
    var appCache = window.applicationCache;
    var statusText = document.getElementById("status");

    appCache.addEventListener("checking", function () {
      statusText.innerHTML = "Checking cache...";
    });

    appCache.addEventListener("downloading", function () {
      statusText.innerHTML = "Downloading files...";
    });

    appCache.addEventListener("progress", function (e) {
      if (e.lengthComputable) {
        var percent = Math.round((e.loaded / e.total) * 100);
        statusText.innerHTML = "Caching: " + percent + "%";
      } else {
        statusText.innerHTML = "Caching files...";
      }
    });

    appCache.addEventListener("cached", function () {
      statusText.innerHTML = "Cache installed successfully.";
      setTimeout(function () {
        location.href = "index.html";
      }, 1500);
    });

    appCache.addEventListener("updateready", function () {
      statusText.innerHTML = "Cache updated.";
      try {
        appCache.swapCache();
      } catch(e) {}
      setTimeout(function () {
        location.href = "index.html";
      }, 1500);
    });

    appCache.addEventListener("noupdate", function () {
      statusText.innerHTML = "Cache already installed.";
      setTimeout(function () {
        location.href = "index.html";
      }, 1500);
    });

    appCache.addEventListener("error", function () {
      statusText.innerHTML = "Cache install failed. Check missing files in PSFree.manifest.";
    });
  </script>
</body>
</html>
